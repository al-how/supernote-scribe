services:
  supernote-scribe:
    # REPLACE 'YOUR_GITHUB_USERNAME' with your actual GitHub username (lowercase)
    # Example: image: ghcr.io/alexn/supernote-scribe:latest
    image: ghcr.io/YOUR_GITHUB_USERNAME/supernote-scribe:latest
    container_name: supernote-scribe
    restart: unless-stopped
    ports:
      - "8086:8501"
    volumes:
      # Map your host directories here.
      # Left side: Path on your server (NAS/Unraid)
      # Right side: Path inside the container (Do not change)
      - ${HOST_SOURCE_PATH}:/data/source:ro
      - ${HOST_OUTPUT_PATH}:/data/output
      - ${HOST_DATA_PATH}:/app/data
    environment:
      # Timezone configuration
      - TZ=${TZ:-America/Chicago}
      # Application Paths (Internal to container, usually don't need changing)
      - SOURCE_PATH=${SOURCE_PATH}
      - OUTPUT_PATH=${OUTPUT_PATH}
      # AI Service Configuration
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    env_file:
      - .env
